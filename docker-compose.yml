version: '3.8'

services:
  go-api:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  python-worker:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    environment:
      - GO_API_URL=http://go-api:8080
    depends_on:
      go-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://go-api:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
