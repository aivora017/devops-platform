groups:
  - name: application.rules
    interval: 30s
    rules:
      - alert: HighPodCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod, namespace) > 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }} in namespace {{ $labels.namespace }}"
          description: "Pod CPU usage is above 70%: {{ $value | humanizePercentage }}"

      - alert: CriticalPodCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod, namespace) > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on pod {{ $labels.pod }}"
          description: "Pod CPU usage is above 90%: {{ $value | humanizePercentage }}"

      - alert: HighPodMemoryUsage
        expr: sum(container_memory_usage_bytes) by (pod, namespace) / sum(container_spec_memory_limit_bytes) by (pod, namespace) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on pod {{ $labels.pod }}"
          description: "Pod memory usage is above 80%: {{ $value | humanizePercentage }}"

      - alert: CriticalPodMemoryUsage
        expr: sum(container_memory_usage_bytes) by (pod, namespace) / sum(container_spec_memory_limit_bytes) by (pod, namespace) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on pod {{ $labels.pod }}"
          description: "Pod memory usage is above 95%: {{ $value | humanizePercentage }}"

  - name: node.rules
    interval: 30s
    rules:
      - alert: HighNodeCPUUsage
        expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on node {{ $labels.instance }}"
          description: "Node CPU usage is above 80%: {{ $value | humanize }}%"

      - alert: CriticalNodeCPUUsage
        expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on node {{ $labels.instance }}"
          description: "Node CPU usage is above 95%: {{ $value | humanize }}%"

      - alert: HighNodeMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on node {{ $labels.instance }}"
          description: "Node memory usage is above 80%: {{ $value | humanizePercentage }}"

      - alert: CriticalNodeMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on node {{ $labels.instance }}"
          description: "Node memory usage is above 95%: {{ $value | humanizePercentage }}"

      - alert: NodeDiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"} / node_filesystem_size_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on node {{ $labels.instance }}"
          description: "Disk usage is above 85% on {{ $labels.device }}"

      - alert: NodeDiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"} / node_filesystem_size_bytes)) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on node {{ $labels.instance }}"
          description: "Disk usage is above 95% on {{ $labels.device }}"

  - name: kubernetes.rules
    interval: 30s
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | humanize }} times in 15 minutes"

      - alert: PodNotHealthy
        expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is not healthy"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in {{ $labels.phase }} state"

      - alert: DeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.deployment }} has mismatched replicas"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} desired replicas: {{ $value }}"

      - alert: StatefulsetReplicasMismatch
        expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "StatefulSet {{ $labels.statefulset }} has mismatched replicas"
          description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} ready replicas: {{ $value }}"

  - name: cost.rules
    interval: 60s
    rules:
      - alert: HighAWSComputeCost
        expr: increase(aws_ec2_instance_count[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High compute resource count in AWS"
          description: "Instance count has increased significantly: {{ $value }} instances"

      - alert: HighStorageCost
        expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High storage usage on PVC {{ $labels.persistentvolumeclaim }}"
          description: "PVC usage is above 85%: {{ $value | humanizePercentage }}"

      - alert: HPAMaxedOut
        expr: kube_hpa_status_current_replicas == kube_hpa_status_max_replicas
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.hpa }} is maxed out"
          description: "Horizontal Pod Autoscaler {{ $labels.namespace }}/{{ $labels.hpa }} is at max replicas"
