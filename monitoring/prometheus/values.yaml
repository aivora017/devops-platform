prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "10GB"
    
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    
    # Use ephemeral storage to avoid PVC provisioning blockers.
    storageSpec: {}
    
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    additionalScrapeConfigs: []

defaultRules:
  rules:
    kubeControllerManager: false
    kubernetesSystemControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubernetesSystemScheduler: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    
    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          continue: true
        - match:
            severity: warning
          receiver: 'warning'
    
    receivers:
      - name: 'default'
      - name: 'critical'
      - name: 'warning'

grafana:
  enabled: false
  adminPassword: "admin123"
  
  persistence:
    enabled: false
    size: 5Gi
    storageClassName: gp2
  
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          version: 1

prometheus-node-exporter:
  enabled: true

kube-state-metrics:
  enabled: true
