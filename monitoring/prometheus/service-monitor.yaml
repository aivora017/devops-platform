apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: go-api-monitor
  namespace: devops
  labels:
    app: go-api
spec:
  selector:
    matchLabels:
      app: go-api
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scheme: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: python-worker-monitor
  namespace: devops
  labels:
    app: python-worker
spec:
  selector:
    matchLabels:
      app: python-worker
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubernetes-nodes-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      k8s-app: kubelet
  endpoints:
    - port: https-metrics
      interval: 30s
      scheme: https
      tlsConfig:
        caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: application-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: application.rules
      interval: 30s
      rules:
        - alert: HighPodCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod, namespace) > 0.7
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on pod {{ $labels.pod }}"
            description: "Pod CPU usage is above 70%: {{ $value | humanizePercentage }}"

        - alert: CriticalPodCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod, namespace) > 0.9
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical CPU usage on pod {{ $labels.pod }}"
            description: "Pod CPU usage is above 90%: {{ $value | humanizePercentage }}"

        - alert: HighPodMemoryUsage
          expr: sum(container_memory_usage_bytes) by (pod, namespace) / sum(container_spec_memory_limit_bytes) by (pod, namespace) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on pod {{ $labels.pod }}"
            description: "Pod memory usage is above 80%: {{ $value | humanizePercentage }}"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: node.rules
      interval: 30s
      rules:
        - alert: HighNodeCPUUsage
          expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on node {{ $labels.instance }}"

        - alert: HighNodeMemoryUsage
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory on node {{ $labels.instance }}"

        - alert: NodeDiskSpaceLow
          expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"} / node_filesystem_size_bytes)) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low disk space on {{ $labels.instance }}"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: kubernetes.rules
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"

        - alert: PodNotHealthy
          expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not healthy"

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment replicas mismatch for {{ $labels.deployment }}"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cost-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: cost.rules
      interval: 60s
      rules:
        - alert: HighStorageCost
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High storage usage on {{ $labels.persistentvolumeclaim }}"

        - alert: HPAMaxedOut
          expr: kube_hpa_status_current_replicas == kube_hpa_status_max_replicas
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.hpa }} is maxed out"

        - alert: ExcessiveNodeCount
          expr: count(kube_node_labels) > 3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Cluster has more than 3 nodes, check scaling"
