alertmanagerSpec:
  image: alertmanager
  version: latest
  
  replicas: 1
  
  logFormat: json
  logLevel: info
  
  retention: 120h
  
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  serviceAccountName: alertmanager

  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534

  containers:
    - name: alertmanager
      args:
        - '--config.file=/etc/alertmanager/config/alertmanager.yaml'
        - '--storage.path=/alertmanager'
        - '--data.retention=120h'
        - '--web.external-url=http://alertmanager:9093'

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - alertmanager
            topologyKey: kubernetes.io/hostname

config:
  global:
    resolve_timeout: 5m

  templates:
    - '/etc/alertmanager/config/*.tmpl'

  route:
    receiver: 'null'
    group_by: ['alertname', 'cluster', 'service']
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 12h
    routes:
      - match:
          severity: critical
        receiver: 'critical'
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 4h
        continue: true

      - match:
          severity: warning
        receiver: 'warning'
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 8h
        continue: true

      - match_re:
          alertname: '.*Cost'
        receiver: 'cost-alerts'
        group_wait: 5m
        group_interval: 30m
        repeat_interval: 24h
        continue: true

  inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'cluster', 'service']

  receivers:
    - name: 'null'

    - name: 'critical'
      webhook_configs:
        - url: 'http://alert-webhook:5555/'
          send_resolved: true
        - url: 'http://alert-handler:5555/alert'
          send_resolved: true

    - name: 'warning'
      webhook_configs:
        - url: 'http://alert-webhook:5556/'
          send_resolved: true

    - name: 'cost-alerts'
      webhook_configs:
        - url: 'http://alert-webhook:5557/'
          send_resolved: true

service:
  annotations: {}
  labels: {}
  clusterIP: None
  type: ClusterIP
  port: 9093
  targetPort: 9093

ingress:
  enabled: false

nodeSelector: {}

affinity: {}

tolerations: []

# Use ephemeral storage for this environment to avoid PVC scheduling issues.
persistence:
  enabled: false
