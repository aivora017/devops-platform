---
- name: Configure Jenkins server
  hosts: jenkins
  become: true
  gather_facts: true

  vars:
    jenkins_port: 8080
    docker_users:
        - ubuntu
        - jenkins
    java_package: openjdk-21-jdk

  tasks:
    - name: Ensure Python 3 is installed
      apt:
        name: python3
        state: present

    - name: update apt cache and upgrade packages
      apt:
        update_cache: true
        upgrade: true
        cache_valid_time: 3600

    - name: No root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: restart ssh

    - name: Check if Java is installed
      shell: dpkg -l | grep openjdk-21
      register: java_installed
      failed_when: false
      changed_when: false

    - name: Install Java
      apt:
        name: "{{ java_package }}"
        state: present
      when: java_installed.rc != 0

    - name: Verify Java installation
      command: java -version
      register: java_version
      ignore_errors: true

    - name: Print Java version
      debug:
        msg: "Java version installed: {{ java_version.stderr }}"

    - name: Check if Jenkins is installed
      shell: dpkg -l | grep jenkins
      register: jenkins_installed
      failed_when: false
      changed_when: false

    - name: Add Jenkins repository and install
      shell: |
        # NOTE: trusted=yes used for simplicity in dev/portfolio environment
        # Production deployments should use proper GPG key verification
        echo "deb [trusted=yes] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list
        apt-get update
        apt-get install -y jenkins
      retries: 3
      delay: 5
      register: jenkins_install
      until: jenkins_install is succeeded
      when: jenkins_installed.rc != 0

    - name: Check if Docker is installed
      shell: dpkg -l | grep docker.io
      register: docker_installed
      failed_when: false
      changed_when: false

    - name: Install Docker
      shell: |
        apt-get update
        apt-get install -y docker.io
      retries: 3
      delay: 5
      register: docker_install
      until: docker_install is succeeded
      when: docker_installed.rc != 0

    - name: Start and enable Jenkins service
      service:
        name: jenkins
        state: started
        enabled: yes
      register: jenkins_start
      retries: 3
      delay: 5
      until: jenkins_start is succeeded

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Wait for Jenkins to be up
      uri:
        url: "http://localhost:{{ jenkins_port }}"
        status_code: [200, 403]
      register: jenkins_status
      retries: 10
      delay: 15
      until: jenkins_status.status in [200, 403]

    - name: Wait for Jenkins initial password file (first-time setup only)
      wait_for:
        path: /var/lib/jenkins/secrets/initialAdminPassword
        state: present
        delay: 5
        timeout: 60
      when: jenkins_install is defined and jenkins_install is changed

    - name: Get Jenkins initial admin password (first-time setup only)
      slurp:
        src: /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      when: jenkins_install is defined and jenkins_install is changed
      ignore_errors: yes

    - name: Print Jenkins information (first-time setup)
      debug:
        msg:
          - "🎉 Jenkins installed successfully!"
          - "Jenkins URL: http://{{ ansible_host }}:{{ jenkins_port }}"
          - "👤 Username: admin"
          - "🔑 Initial admin password: {{ jenkins_password.content | b64decode }}"
      when: jenkins_install is defined and jenkins_install is changed and jenkins_password is succeeded

    - name: Print Jenkins URL (already installed)
      debug:
        msg:
          - "✅ Jenkins is running"
          - "Jenkins URL: http://{{ ansible_host }}:{{ jenkins_port }}"
      when: jenkins_install is not defined or not (jenkins_install is changed)

  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted

